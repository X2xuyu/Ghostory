<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <title>Ghostory</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="logo-icon">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-1-1 4-4-4-4 1-1 5 5-5 5z" fill="url(#grad)"/>
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#f09433"/>
              <stop offset="25%" style="stop-color:#e6683c"/>
              <stop offset="50%" style="stop-color:#dc2743"/>
              <stop offset="75%" style="stop-color:#cc2366"/>
              <stop offset="100%" style="stop-color:#bc1888"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="title">Ghostory</h1>
      </div>
      <span class="version">v1.0.0</span>
    </header>

    <!-- Status Card -->
    <div class="card status-card">
      <div class="status-row">
        <div class="status-info">
          <div class="status-indicator" id="statusDot"></div>
          <span class="status-text" id="statusText">Active</span>
        </div>
        <button class="toggle-btn" id="toggleBtn" title="Toggle stealth mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="toggleIcon">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="status-desc" id="statusDesc">Story seen events are being blocked</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value" id="sessionCount">0</span>
        <span class="stat-label">Session</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">Total Blocked</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="rulesCount">8</span>
        <span class="stat-label">Active Rules</span>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="card log-card">
      <div class="log-header">
        <h3 class="log-title">Recent Blocks</h3>
        <button class="clear-btn" id="clearBtn" title="Clear history">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
      <div class="log-list" id="logList">
        <div class="log-empty" id="logEmpty">No blocked requests yet</div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>👁️‍🗨️ View stories. Stay invisible.</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
